version: '3.8'

services:
  app:
    # 現在のディレクトリ(.)にあるDockerfileを使ってビルドします
    build:
      context: .
      dockerfile: Dockerfile
    
    # コンテナの名前を指定します
    container_name: zero-lab-app
    
    # ホストの3000番ポートをコンテナの3000番ポートに繋ぎます
    # 先ほど実行された -p 3000:3000 と同じ役割です
    ports:
      - "3000:3000"
    
    # 開発環境向けの便利な設定（ローカルのファイル変更をコンテナに即座に反映します）
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    
    # 万が一コンテナが落ちてしまっても、自動で再起動するようにします
    restart: unless-stopped
